name: CI Pipeline For Terraform

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  secrets-scanning:
    name: Secrets Scanning
    uses: ./.github/workflows/secrets-scanning.yml
    secrets: inherit
    permissions:
      contents: read
      pull-requests: read

  tfsec:
    name: tfsec
    uses: ./.github/workflows/tfsec.yml
    permissions:
      contents: read
      pull-requests: read

  terraform-plan:
    name: Terraform Plan
    needs: [secrets-scanning, tfsec]
    uses: ./.github/workflows/terraform-plan.yml
    secrets: inherit
    permissions:
      id-token: write
      contents: read
      pull-requests: read